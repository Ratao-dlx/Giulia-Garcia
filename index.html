<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giulia Garcia | Portal Privado</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .hero {
        text-align: center;
        padding: 80px 0 40px 0;
      }
      .hero h1 {
        font-size: 56px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -2px;
        margin-bottom: 20px;
        line-height: 1.1;
      }
      .hero h1 span {
        color: var(--primary-red);
        text-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
      }
      .hero p {
        font-size: 18px;
        color: var(--text-muted);
        max-width: 500px;
        margin: 0 auto 40px auto;
      }

      .teaser-box {
        position: relative;
        max-width: 800px;
        height: 400px;
        margin: 0 auto;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: url("placeholder-sua-imagem.jpg") center/cover; /* Troque pela foto real */
      }
      .teaser-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          0deg,
          var(--bg-dark) 0%,
          rgba(3, 3, 3, 0.3) 100%
        );
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <header class="header-nav">
      <a href="/" class="logo">Giulia<span>Garcia</span></a>
      <div class="nav-links">
        <a href="/" class="active">Início</a>
        <a href="/diario">Diário</a>
        <a href="/galeria">Galeria</a>
        <a href="/vip">Acesso VIP</a>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Regras não se<br />aplicam <span>aqui.</span></h1>
        <p>
          O lado que o algoritmo censura. Sem filtros, sem limites e
          estritamente confidencial.
        </p>
      </section>

      <section class="teaser-box">
        <div class="teaser-overlay">
          <a href="/vip" class="btn-premium">Desbloquear Meu Acesso</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-warning">⚠️ Ambiente Estritamente +18</div>
      <p>&copy; 2026 Giulia Garcia. Acesso Restrito.</p>
    </footer>
  </body>
</html>
