<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria | Giulia Garcia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/">Início</a>
        <a href="/diario">Diário</a>
        <a href="/galeria" class="active">Galeria</a>
        <a href="/vip">Acesso VIP</a>
    </nav>

    <main class="container" style="padding-top: 60px;">
        <header style="text-align: center; margin-bottom: 50px;">
            <h1 class="hero-title">ACERVO <span>PRIVADO</span></h1>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px;">
            <div style="height: 400px; border-radius: 12px; border: 2px solid var(--clr-primary); background: url('AMOSTRA.jpg') center/cover;">
                <div style="padding: 10px; background: var(--clr-primary); color: white; display: inline-block; font-size: 10px; font-weight: 900;">AMOSTRA</div>
            </div>

            <div style="height: 400px; border-radius: 12px; background: #1a1a1a; position: relative; overflow: hidden; border: 1px solid var(--clr-border);">
                <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <span style="font-size: 2rem;">🔒</span>
                    <p style="color: var(--clr-primary); font-weight: 900; margin-top: 10px; font-size: 12px;">SÓ NO VIP</p>
                </div>
            </div>
            <div style="height: 400px; border-radius: 12px; background: #1a1a1a; position: relative; overflow: hidden; border: 1px solid var(--clr-border);">
                <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <span style="font-size: 2rem;">🔒</span>
                    <p style="color: var(--clr-primary); font-weight: 900; margin-top: 10px; font-size: 12px;">SÓ NO VIP</p>
                </div>
            </div>
            <div style="height: 400px; border-radius: 12px; background: #1a1a1a; position: relative; overflow: hidden; border: 1px solid var(--clr-border);">
                <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <span style="font-size: 2rem;">🔒</span>
                    <p style="color: var(--clr-primary); font-weight: 900; margin-top: 10px; font-size: 12px;">SÓ NO VIP</p>
                </div>
            </div>
        </div>
        <div style="text-align: center;"><a href="/vip" class="btn-cta">Liberar Todo o Acervo</a></div>
    </main>
</body>
</html>
