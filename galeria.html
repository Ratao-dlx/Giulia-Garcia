<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria | Giulia Garcia</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-bottom: 50px;
      }
      .gallery-item {
        height: 300px;
        background: var(--card-bg);
        border-radius: 12px;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .locked {
        filter: blur(8px);
        opacity: 0.5;
        width: 100%;
        height: 100%;
        background: #27272a;
      }
      .lock-icon {
        position: absolute;
        z-index: 10;
        font-size: 40px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/">Início</a>
      <a href="/diario">Diário</a>
      <a href="/galeria" class="active">Galeria</a>
      <a href="/vip">Acesso VIP</a>
    </nav>

    <div class="container">
      <h1 class="hero-title">Galeria <span>Privada</span></h1>
      <p class="hero-subtitle">
        Mais de 500+ mídias exclusivas esperando por você.
      </p>

      <div class="gallery-grid">
        <div class="gallery-item">
          <div class="locked"></div>
          <div class="lock-icon">🔒</div>
        </div>
        <div class="gallery-item">
          <div class="locked"></div>
          <div class="lock-icon">🔒</div>
        </div>
        <div class="gallery-item">
          <div class="locked"></div>
          <div class="lock-icon">🔒</div>
        </div>
        <div class="gallery-item">
          <div class="locked"></div>
          <div class="lock-icon">🔒</div>
        </div>
      </div>

      <a href="/vip" class="btn btn-main" style="max-width: 400px"
        >DESBLOQUEAR GALERIA (R$ 39,90)</a
      >
    </div>
  </body>
</html>
