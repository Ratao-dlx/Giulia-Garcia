<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria Privada | Giulia Garcia</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ==========================================================================
           ESTILOS ESPECÍFICOS DA GALERIA
           ========================================================================== */
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        margin-bottom: 60px;
      }

      .gallery-item {
        background-color: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        height: 320px;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-card);
        transition:
          transform 0.3s ease,
          border-color 0.3s ease;
      }

      .gallery-item:hover {
        transform: translateY(-5px);
        border-color: var(--color-border-focus);
      }

      /* Efeito de Vidro Fosco sobre as imagens (gatilho de curiosidade) */
      .locked-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(9, 9, 11, 0.6);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        z-index: 2;
      }

      /* Camada de fundo para dar textura ao blur */
      .placeholder-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #1a1a1a;
        /* Dica: Você pode colocar o link de imagens reais borradas aqui depois */
        /* background-image: url('sua-foto.jpg'); */
        background-size: cover;
        background-position: center;
        z-index: 1;
        filter: blur(8px);
        opacity: 0.5;
      }

      .lock-icon {
        font-size: 42px;
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
      }

      .lock-text {
        color: var(--color-gold-main);
        font-weight: 800;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      .cta-wrapper {
        max-width: 450px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/">Início</a>
      <a href="/diario">Diário</a>
      <a href="/galeria" class="active">Galeria</a>
      <a href="/vip">Acesso VIP</a>
    </nav>

    <main class="container">
      <header style="text-align: center; margin-bottom: 50px">
        <h1 class="hero-title">Acervo <span>Trancado</span></h1>
        <p class="hero-subtitle">
          Mais de 500+ mídias exclusivas esperando por você.
        </p>
      </header>

      <section class="gallery-grid">
        <div class="gallery-item">
          <div class="placeholder-bg"></div>
          <div class="locked-overlay">
            <div class="lock-icon">🔒</div>
            <div class="lock-text">Exclusivo VIP</div>
          </div>
        </div>

        <div class="gallery-item">
          <div class="placeholder-bg"></div>
          <div class="locked-overlay">
            <div class="lock-icon">🔒</div>
            <div class="lock-text">Exclusivo VIP</div>
          </div>
        </div>

        <div class="gallery-item">
          <div class="placeholder-bg"></div>
          <div class="locked-overlay">
            <div class="lock-icon">🔒</div>
            <div class="lock-text">Exclusivo VIP</div>
          </div>
        </div>
      </section>

      <section class="cta-wrapper">
        <a href="/vip" class="btn btn-premium">Desbloquear Galeria Completa</a>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Giulia Garcia Oficial. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
