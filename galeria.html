<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria | Giulia Garcia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .gallery-item { height: 400px; border-radius: 16px; border: 1px solid var(--clr-border); overflow: hidden; position: relative; background-size: cover; background-position: center; }
        
        /* 1 Foto Desbloqueada */
        .unlocked { background-image: url('foto-aberta.jpg'); /* <- INSIRA FOTO ABERTA AQUI */ border-color: var(--clr-primary); }
        .unlocked-tag { position: absolute; top: 15px; left: 15px; background: var(--clr-primary); color: white; padding: 4px 10px; font-size: 11px; font-weight: 900; border-radius: 6px; }

        /* 3 Fotos Bloqueadas com Blur de Silhueta */
        .locked { background-image: url('foto-borrada.jpg'); /* <- INSIRA UMA FOTO QUALQUER AQUI, ELA SERÁ BORRADA */ }
        .locked-blur-overlay {
            position: absolute; inset: 0; background: rgba(5, 5, 5, 0.4); /* Fundo semi-transparente */
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); /* Borra a imagem que está atrás */
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2;
        }
        .lock-icon { font-size: 3rem; color: var(--clr-text-main); filter: drop-shadow(0 0 15px var(--clr-primary-glow)); margin-bottom: 10px; }
        .lock-text { color: var(--clr-primary); font-weight: 900; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/">Início</a>
        <a href="/diario">Diário</a>
        <a href="/galeria" class="active">Galeria</a>
        <a href="/vip">Acesso VIP</a>
    </nav>

    <main class="container" style="padding-top: 60px; text-align: center;">
        <h1 class="hero-title">Acervo <span>Restrito</span></h1>
        <p style="color: var(--clr-text-dim); font-size: 1.1rem; margin-bottom: 50px;">Apenas uma amostra do que te espera lá dentro.</p>

        <div class="gallery-grid">
            <div class="gallery-item unlocked"><div class="unlocked-tag">AMOSTRA</div></div>

            <div class="gallery-item locked">
                <div class="locked-blur-overlay"><div class="lock-icon">🔒</div><div class="lock-text">Desbloquear no VIP</div></div>
            </div>
            <div class="gallery-item locked">
                <div class="locked-blur-overlay"><div class="lock-icon">🔒</div><div class="lock-text">Desbloquear no VIP</div></div>
            </div>
            <div class="gallery-item locked">
                <div class="locked-blur-overlay"><div class="lock-icon">🔒</div><div class="lock-text">Desbloquear no VIP</div></div>
            </div>
        </div>

        <a href="/vip" class="btn-cta btn-cta--red" style="max-width: 450px;">Acessar as 500+ Mídias Privadas</a>
    </main>
</body>
</html>
