<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VIP | Giulia Garcia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .timer-top { position: fixed; top: 0; width: 100%; height: 35px; background: var(--clr-primary); z-index: 10000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; }
        .plan-card { background: var(--clr-surface); padding: 40px; border-radius: 20px; border: 1px solid var(--clr-border); display: flex; flex-direction: column; transition: 0.3s; }
        .plan-card.featured { border: 2px solid var(--clr-primary); transform: scale(1.05); box-shadow: 0 0 40px rgba(208, 0, 0, 0.2); }
        #toast { position: fixed; bottom: 30px; left: 30px; background: #18181b; padding: 15px 25px; border-radius: 12px; border-left: 4px solid var(--clr-primary); visibility: hidden; opacity: 0; transition: 0.5s; z-index: 10000; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body style="padding-top: 115px;">
    <div class="timer-top">OFERTA TERMINA EM: <span id="clock" style="margin-left: 10px;">15:00</span></div>
    <nav class="navbar" style="top: 35px;"><a href="/">Início</a><a href="/diario">Diário</a><a href="/galeria">Galeria</a><a href="/vip" class="active">Acesso VIP</a></nav>

    <main class="container">
        <h1 class="hero-title" style="text-align: center;">NÍVEL DE <span>ACESSO</span></h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 50px;">
            <div class="plan-card featured">
                <p style="color: var(--clr-primary); font-weight: 900; font-size: 12px; text-transform: uppercase;">Mais Escolhido</p>
                <h2 style="font-size: 2.5rem; margin: 15px 0;">Ouro Personal</h2>
                <h3 style="font-size: 2rem; margin-bottom: 25px;">R$ 149,90</h3>
                <ul style="list-style: none; margin-bottom: 30px; color: #d4d4d8;">
                    <li>✓ Chat 1 a 1 Direto</li>
                    <li>✓ Pedidos Personalizados</li>
                    <li>✓ Acesso Total ao Acervo</li>
                </ul>
                <a href="https://pay.kiwify.com.br/FcTkho0" class="btn-cta">Garantir Meu Lugar</a>
            </div>
            </div>
    </main>

    <div id="toast"><span id="toast-text"></span></div>

    <script>
        // Timer Robusto
        let time = 900;
        setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            time--;
        }, 1000);

        // Social Proof
        const names = ["Marcos", "André", "Júlio", "Felipe", "Ricardo", "Gustavo"];
        setInterval(() => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = `${names[Math.floor(Math.random()*names.length)]} acabou de entrar no VIP!`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }, 12000);
    </script>
</body>
</html>
